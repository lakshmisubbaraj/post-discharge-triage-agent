<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GI Post-Procedure Follow-up</title>
<style>
  :root {
    --brand: #0f4c81;
    --brand-light: #e8f1f8;
    --bg: #f4f6f9;
    --ink: #1a2233;
    --muted: #667085;
    --ed: #dc2626;
    --urgent: #ea580c;
    --callback: #7c3aed;
    --clinic: #ca8a04;
    --labs: #0d9488;
    --routine: #16a34a;
    --sidebar-w: 300px;
    --topbar-h: 56px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--ink); min-height: 100vh;
  }
  .view { display: none; min-height: 100vh; }
  .view.active { display: block; }

  /* ---------- Landing ---------- */
  #view-landing {
    display: none;
    align-items: center; justify-content: center; min-height: 100vh;
    background: linear-gradient(135deg, #0f4c81 0%, #1a6fa8 100%);
  }
  #view-landing.active { display: flex; }
  .landing-card {
    background: white; border-radius: 16px; padding: 48px 44px; width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); text-align: center;
  }
  .landing-card h1 { font-size: 26px; margin: 0 0 4px; color: var(--brand); letter-spacing: -0.5px; }
  .landing-card .subtext { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .landing-card input {
    width: 100%; padding: 11px 14px; margin-bottom: 12px; border: 1px solid #d0d5dd;
    border-radius: 8px; font-size: 14px; background: #fafbfc;
  }
  .landing-card input:focus { outline: none; border-color: var(--brand); background: white; }
  .login-btn {
    width: 100%; padding: 12px; margin-top: 8px; background: var(--brand); color: white;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background 0.15s;
  }
  .login-btn:hover { background: #0c3d68; }
  .landing-foot { margin-top: 20px; font-size: 12px; color: #98a2b3; }

  /* ---------- Top bar ---------- */
  .topbar {
    background: var(--brand); color: white; padding: 0 28px; display: flex;
    align-items: center; justify-content: space-between; height: var(--topbar-h);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar .brand { font-weight: 700; font-size: 16px; letter-spacing: -0.2px; }
  .topbar .brand .sub { font-weight: 400; opacity: 0.75; font-size: 12px; margin-left: 10px; }

  /* ---------- Dashboard layout: fixed sidebar + main panel ---------- */
  .dashboard-layout { display: flex; align-items: flex-start; }
  .sidebar-queue {
    width: var(--sidebar-w); flex: 0 0 var(--sidebar-w);
    position: sticky; top: var(--topbar-h);
    height: calc(100vh - var(--topbar-h));
    overflow-y: auto;
    background: white; border-right: 1px solid #e4e8ee;
    padding: 18px 14px;
  }
  .sidebar-queue h4 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted);
    margin: 0 0 3px 6px;
  }
  .sidebar-queue .queue-sub { font-size: 11.5px; color: #98a2b3; margin: 0 0 14px 6px; }
  .queue-row {
    border-radius: 10px; padding: 11px 12px; margin-bottom: 6px; cursor: pointer;
    border: 1.5px solid transparent; transition: background 0.12s, border-color 0.12s;
  }
  .queue-row:hover { background: #f7f9fb; }
  .queue-row.active { background: var(--brand-light); border-color: var(--brand); }
  .queue-row .qname { font-size: 13.5px; font-weight: 600; margin-bottom: 2px; }
  .queue-row .qmeta { font-size: 11.5px; color: var(--muted); margin-bottom: 6px; }
  .queue-status-pill {
    display: inline-block; font-size: 10.5px; font-weight: 700; padding: 3px 8px;
    border-radius: 999px; color: white; letter-spacing: 0.2px;
  }
  .queue-status-pending { background: #eef1f5; color: var(--muted); }
  .queue-call-btn {
    background: var(--brand); color: white; border: none; padding: 5px 12px;
    border-radius: 6px; font-size: 11.5px; font-weight: 600; cursor: pointer;
  }
  .queue-call-btn:hover { background: #0c3d68; }

  .main-panel { flex: 1; min-width: 0; padding: 0 0 60px; }
  .placeholder-panel {
    display: flex; align-items: center; justify-content: center; height: calc(100vh - var(--topbar-h));
    color: #98a2b3; font-size: 14px; text-align: center; padding: 0 40px;
  }

  .call-header {
    background: white; padding: 18px 28px; border-bottom: 1px solid #eef1f5;
  }
  .call-header h2 { margin: 0 0 2px; font-size: 17px; }
  .call-header .meta { color: var(--muted); font-size: 13px; }
  .call-status {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px;
    color: var(--muted); margin-top: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #dc2626; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .start-call-box { padding: 60px 40px; text-align: center; }
  .start-call-box h2 { font-size: 19px; margin-bottom: 6px; }
  .start-call-box p { color: var(--muted); font-size: 13.5px; margin-bottom: 24px; }
  .start-call-btn {
    background: var(--brand); color: white; border: none; padding: 13px 28px;
    border-radius: 9px; font-size: 14.5px; font-weight: 600; cursor: pointer;
  }
  .start-call-btn:hover { background: #0c3d68; }

  .section-block {
    background: white; margin: 18px 28px 0; border-radius: 12px;
    padding: 20px 24px; box-shadow: 0 1px 3px rgba(16,24,40,0.06); border: 1px solid #eef1f5;
    opacity: 0; transform: translateY(8px); transition: opacity 0.4s, transform 0.4s;
  }
  .section-block.show { opacity: 1; transform: translateY(0); }
  .section-block.instant { transition: none; }
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--brand); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-label .badge-agent { background: var(--brand-light); color: var(--brand); padding: 2px 8px; border-radius: 999px; }

  .transcript-area { padding: 4px 0; }
  .t-line { font-size: 14px; margin-bottom: 10px; opacity: 0; transform: translateY(4px); animation: appear 0.3s forwards; }
  .t-line.instant { opacity: 1; transform: none; animation: none; }
  @keyframes appear { to { opacity: 1; transform: translateY(0); } }
  .t-line .who { font-weight: 700; margin-right: 8px; }
  .t-line.agent .who { color: #64748b; }
  .t-line.pt .who { color: var(--brand); }

  .tier-pill { display: inline-block; color: white; padding: 6px 14px; border-radius: 7px; font-size: 13.5px; font-weight: 700; margin-bottom: 12px; }
  .rationale-list, .flags-list { margin: 6px 0 14px; padding-left: 20px; font-size: 13.5px; line-height: 1.6; }
  .rationale-list li, .flags-list li { margin-bottom: 4px; }
  .sub-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin: 14px 0 4px; }

  .note-field { font-size: 13.5px; line-height: 1.6; margin-bottom: 12px; }
  .note-field b { display: block; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); margin-bottom: 3px; }
  .note-field textarea {
    width: 100%; font-family: inherit; font-size: 13.5px; line-height: 1.6; padding: 8px 10px;
    border: 1px solid #d0d5dd; border-radius: 6px; resize: vertical; min-height: 60px;
  }
  .action-items { margin: 4px 0 0; padding-left: 20px; font-size: 13.5px; }
  .action-items li { margin-bottom: 5px; }
  .action-items input[type=text] {
    width: 90%; font-family: inherit; font-size: 13.5px; padding: 4px 6px; border: 1px solid #d0d5dd; border-radius: 5px;
  }

  .note-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .copy-btn {
    background: var(--brand-light); color: var(--brand); border: none; padding: 6px 14px;
    border-radius: 6px; font-size: 12.5px; font-weight: 600; cursor: pointer;
  }
  .copy-btn:hover { background: #d6e6f2; }

  .review-actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .btn-agree {
    background: #16a34a; color: white; border: none; padding: 11px 18px; border-radius: 8px;
    font-size: 13.5px; font-weight: 600; cursor: pointer;
  }
  .btn-agree:hover { background: #128038; }
  .btn-edit {
    background: white; color: var(--brand); border: 1.5px solid var(--brand); padding: 11px 18px;
    border-radius: 8px; font-size: 13.5px; font-weight: 600; cursor: pointer;
  }
  .btn-edit:hover { background: var(--brand-light); }
  .btn-save {
    background: var(--brand); color: white; border: none; padding: 9px 16px; border-radius: 7px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-cancel {
    background: white; color: var(--muted); border: 1px solid #d0d5dd; padding: 9px 16px;
    border-radius: 7px; font-size: 13px; cursor: pointer;
  }

  .confirm-banner {
    margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-size: 13.5px; font-weight: 600;
    display: none;
  }
  .confirm-banner.agree { background: #dcfce7; color: #166534; }
  .confirm-banner.show { display: block; }

  .edit-history {
    margin-top: 10px; font-size: 12px; color: var(--muted); cursor: pointer; display: none;
  }
  .edit-history.show { display: block; }
  .edit-history .rev { background: #f9fafb; border: 1px solid #eef1f5; border-radius: 6px; padding: 8px 10px; margin-top: 6px; display: none; }
  .edit-history .rev.open { display: block; }
  .edit-history .rev .rev-block { margin-bottom: 6px; }
  .edit-history .rev .rev-block b { display: block; color: var(--ink); }
  .strike { text-decoration: line-through; color: #b42318; opacity: 0.75; }
  .added { color: #067647; }
</style>
</head>
<body>

<!-- ============ LANDING ============ -->
<div id="view-landing" class="view active">
  <div class="landing-card">
    <h1>GI Post-Procedure Follow-up</h1>
    <div class="subtext">Created by the UCSF GI team</div>
    <input type="text" placeholder="Username" value="j.chen@ucsf.edu">
    <input type="password" placeholder="Password" value="••••••••••">
    <button class="login-btn" onclick="goTo('dashboard')">Log in</button>
    <div class="landing-foot">GI Post-Procedure Care Team Portal</div>
  </div>
</div>

<!-- ============ DASHBOARD (fixed sidebar queue + main panel) ============ -->
<div id="view-dashboard" class="view">
  <div class="topbar">
    <div class="brand">GI Post-Procedure Follow-up <span class="sub">UCSF GI team</span></div>
  </div>
  <div class="dashboard-layout">
    <div class="sidebar-queue">

      <div class="placeholder-panel">Select a patient from the Care Team Queue to view their record or start a check-in call.</div>
    </div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------

// (produced by test_gi_agents.py against the live Sonnet-5 / Haiku agents)

const PATIENTS = [{"slug": "helen", "name": "Helen R.", "age": 76, "gender": "female", "discharge_dx": "Screening colonoscopy with cold snare polypectomy x2 (6mm ascending, 4mm sigmoid)", "days_since_discharge": 6, "transcript": [["AGENT", "Hi Helen, this is your GI care team checking in after your colonoscopy last week. How are you doing?"], ["PT", "I was doing fine until this afternoon, but something scary happened and I was about to call you."], ["AGENT", "I'm glad you picked up. Tell me what's going on."], ["PT", "I passed a big amount of bright red blood into the toilet \u2014 twice now, a couple hours apart. There were clots in it too."], ["AGENT", "Thank you for telling me. How are you feeling in yourself \u2014 any dizziness or weakness?"], ["PT", "Yes, when I stand up I feel dizzy and a bit sweaty. I've been sitting down because I'm afraid I'll fall."], ["AGENT", "Any belly pain or fever?"], ["PT", "No pain really, just the bleeding and feeling woozy."], ["AGENT", "Helen, bleeding like this after polyp removal with dizziness needs to be evaluated in the emergency department right away. Is someone home who can take you?"], ["PT", "My daughter is next door. I'll call her now."]], "expected_disposition": "emergency_department", "triage": {"severity": "emergency_department", "label": "Post-polypectomy hemorrhage with orthostatic symptoms - send to ED now", "rationale": ["Patient reports two episodes of passing 'a big amount of bright red blood' with clots a few hours apart, occurring days after colonoscopy with polypectomy (ascending and sigmoid colon) - classic delayed post-polypectomy bleeding.", "Patient reports orthostatic dizziness and sweating on standing ('when I stand up I feel dizzy and a bit sweaty'), and has been avoiding standing 'because I'm afraid I'll fall' - concerning signs of hemodynamic compromise/hypovolemia from ongoing GI blood loss.", "This constitutes an acute, potentially life-threatening complication of a recent procedure requiring immediate emergency evaluation, not same-day urgent care or routine follow-up.", "Agent already advised ED and patient is arranging transport with her daughter, consistent with the emergent nature of this presentation."], "flags": ["post_polypectomy_bleeding", "hematochezia_with_clots", "orthostatic_symptoms_possible_hypovolemia", "recent_colonoscopy_polypectomy", "requires_immediate_ED_evaluation"]}, "match": true, "note": {"subjective": "Patient reports two episodes of passing a large amount of bright red blood with clots into toilet over the past couple hours. Denies abdominal pain or fever. Reports feeling dizzy and sweaty when standing; has been remaining seated due to fear of falling. Denies other constitutional symptoms.", "assessment": "76F with hypertension and osteopenia s/p colonoscopy with polypectomy (6 mm ascending colon, 4 mm sigmoid) on 2026-07-31 presenting with delayed post-polypectomy hemorrhage. Bright red blood with clots and orthostatic dizziness/diaphoresis are classic signs of acute GI bleeding with hemodynamic compromise. Requires emergency evaluation.", "plan": "ED referral emergently for evaluation of post-polypectomy hemorrhage with orthostatic symptoms. Patient arranging transport with daughter. ED to evaluate for ongoing bleeding, hemodynamic stability, and transfusion/endoscopic intervention as clinically indicated. Pathology review and surveillance interval planning deferred pending acute clinical resolution.", "action_items": ["Alert ED of post-polypectomy bleed and orthostatic symptoms on arrival", "Hold routine pathology follow-up and surveillance interval decision pending acute episode resolution", "Ensure GI attends ED evaluation or receives handoff note detailing procedure findings and complications"]}}, {"slug": "miguel", "name": "Miguel F.", "age": 38, "gender": "male", "discharge_dx": "EGD with duodenal biopsy for suspected celiac disease (confirmatory biopsy)", "days_since_discharge": 3, "transcript": [["AGENT", "Hi Miguel, checking in after your upper endoscopy earlier this week. How's the recovery going?"], ["PT", "Honestly, not great. Since yesterday I've had a fever \u2014 I measured 101.5 last night."], ["AGENT", "I'm sorry to hear that. Any other symptoms with the fever?"], ["PT", "I've got a cough with some junk coming up, and I get short of breath just walking to the kitchen. It started the day after the scope."], ["AGENT", "Any chest pain, or trouble swallowing?"], ["PT", "No chest pain exactly, it's more the coughing and being winded. Swallowing is fine."], ["AGENT", "Are you able to keep fluids down and eat?"], ["PT", "Yeah, eating and drinking okay, just tired and feverish."], ["AGENT", "Given the timing right after sedation, this needs an in-person exam and likely a chest X-ray today \u2014 same-day at urgent care or our clinic, not something to wait on."], ["PT", "Okay, I can get a ride over this afternoon."]], "expected_disposition": "urgent_care_same_day", "triage": {"severity": "emergency_department", "label": "Post-sedation/EGD fever with productive cough and dyspnea - concern for aspiration pneumonia", "rationale": ["Patient reports fever of 101.5F starting the day after EGD with sedation", "New productive cough ('junk coming up') and shortness of breath with minimal exertion (walking to kitchen), onset the day after the scope - timing raises concern for aspiration pneumonia post-procedure", "Exertional dyspnea in the setting of fever and productive cough is a red flag for respiratory compromise that warrants emergent evaluation (vitals, pulse oximetry, CXR, possible labs/blood cultures) rather than routine urgent care alone", "Although patient denies chest pain and reports tolerating oral intake, the combination of fever + productive cough + dyspnea after a sedated endoscopic procedure is concerning for aspiration pneumonia or other acute pulmonary process that should be evaluated in the ED given risk of rapid deterioration", "No chest pain and swallowing is fine per patient, but this does not offset the respiratory symptom cluster warranting urgent in-person assessment with imaging same day"], "flags": ["fever", "productive_cough", "exertional_dyspnea", "post_sedation_procedure", "possible_aspiration_pneumonia", "same_day_evaluation_needed"]}, "match": false, "note": {"subjective": "Patient reports fever measured at 101.5\u00b0F starting yesterday (day after EGD). Associated with new productive cough (\"junk coming up\") and dyspnea with minimal exertion (walking to kitchen), both onset day after procedure. Denies chest pain. Swallowing intact. Tolerating oral intake and fluids. Reports fatigue.", "assessment": "36 yo M with serology-suspected celiac disease (tTG-IgA 152 U/mL, IgA-sufficient) s/p EGD with duodenal biopsy and sedation on 2026-07-28 now presenting with fever, productive cough, and exertional dyspnea starting POD1. Clinical picture concerning for aspiration pneumonia or other acute pulmonary process post-sedation. Timing and symptom cluster (fever + productive cough + dyspnea) warrant emergent evaluation with imaging rather than observation given risk for rapid respiratory deterioration.", "plan": "Disposition: ED evaluation today (same-day). Obtain vitals, pulse oximetry, CXR, labs including CBC and comprehensive metabolic panel, and blood cultures as indicated. Assess for aspiration pneumonia, aspiration-related complications, or alternative acute pulmonary process. Pending duodenal biopsy pathology (Marsh grade) will continue on separate clinical path \u2014 priority is acute pulmonary evaluation.", "action_items": ["Direct patient to ED for same-day evaluation (fever + productive cough + dyspnea POD1 s/p EGD with sedation)", "Ensure CXR performed at ED to rule out aspiration pneumonia", "Order CBC and CMP at ED; consider blood cultures given fever", "Do not defer celiac pathology follow-up \u2014 call patient with biopsy result once available (expected 2026-08-01) independently of acute ED visit"]}}, {"slug": "harriet", "name": "Harriet B.", "age": 88, "gender": "female", "discharge_dx": "Colonoscopy with biopsy of 4cm ascending colon mass (workup of iron-deficiency anemia + weight loss)", "days_since_discharge": 5, "transcript": [["AGENT", "Hi Ms. Beaumont, this is your care team calling to see how you're feeling after your colonoscopy last week."], ["PT", "My colonoscopy? Oh... I don't think I've had one of those, dear."], ["AGENT", "It was about five days ago, at the hospital. How has your tummy been feeling \u2014 any pain or bleeding?"], ["PT", "I couldn't really say. The girls here handle all of that."], ["AGENT", "Have you noticed any blood when you use the bathroom, or felt dizzy?"], ["PT", "I don't remember. Maybe? What was it you were asking about?"], ["AGENT", "That's alright. Are you still taking your blood thinner, the apixaban?"], ["PT", "The nurse gives me my pills. I don't know their names, I just take what's in the little cup."], ["AGENT", "Is your daughter or one of the nurses nearby who could join the call?"], ["PT", "She visits on Sundays, I think. Or was that last week?"], ["AGENT", "No problem, Ms. Beaumont. We'll have one of our nurses call your daughter and the facility directly to check on you properly."]], "expected_disposition": "clinician_callback_required", "triage": {"severity": "clinician_callback_required", "label": "Unable to obtain clinical status - route to POA/facility via clinician callback", "rationale": ["Patient has dementia and could not recall the colonoscopy at all ('My colonoscopy? Oh... I don't think I've had one of those, dear.'), and gave no reliable answers about pain, bleeding, dizziness, or medication status ('I couldn't really say', 'I don't remember. Maybe? What was it you were asking about?').", "Patient is not the appropriate historian for medication reconciliation ('The nurse gives me my pills. I don't know their names') and could not confirm whether apixaban has been resumed, which is a time-sensitive open item given the post-polypectomy anticoagulation hold and dose-reconciliation question.", "No family/POA or facility staff was available on the call to supplement the history (daughter's visit schedule is uncertain per patient - 'She visits on Sundays, I think. Or was that last week?').", "This meets guardrail condition 1 (insufficient information) for clinician_callback_required: the transcript contains no usable clinical information about post-procedure bleeding, pain, or anticoagulation status due to the patient's cognitive impairment, so a clinical disposition cannot be responsibly assigned from this conversation alone.", "Given the high-acuity open items on this chart (suspicious ascending colon mass, pending biopsy, anemia with active bleeding risk, unresolved apixaban resumption/dosing), this callback should be treated as high priority so a nurse can reach the POA/facility directly and confirm there is no occult bleeding or missed anticoagulation issue."], "flags": ["cognitively_impaired_historian_unreliable", "no_caregiver_available_on_call", "pending_critical_biopsy_ascending_colon_mass", "anticoagulation_status_unconfirmed_post_polypectomy", "active_gi_bleed_risk_anemia", "requires_urgent_human_outreach_to_POA_and_facility"]}, "match": true, "note": {"subjective": "Post-discharge check-in call 5 days after colonoscopy on 2026-08-06. Patient unable to recall procedure ('My colonoscopy? Oh... I don't think I've had one of those, dear.') or answer questions about post-procedure course. Unable to report pain, bleeding, dizziness, or medication adherence. States 'The nurse gives me my pills. I don't know their names' \u2014 unable to confirm apixaban resumption or current medication status. Daughter (POA) not available on call; patient uncertain of visit schedule ('She visits on Sundays, I think. Or was that last week?'). No facility staff present to supplement history.", "assessment": "Insufficient clinical information obtained due to patient's dementia. Patient is not r PATIENTS.forEach(p => { p.called = false; p.agreed = false; });

const TIER_LABELS = {
  emergency_department: "Emergency department",
  urgent_care_same_day: "Urgent care (same day)",
  clinician_callback_required: "Clinician callback required",
  clinic_follow_up: "Clinic follow-up",
  labs_imaging_needed: "Labs/imaging needed",
  routine_follow_up: "Routine follow-up",
};
const TIER_LABELS_SHORT = {
  emergency_department: "ED",
  urgent_care_same_day: "Urgent care",
  clinician_callback_required: "Callback needed",
  clinic_follow_up: "Clinic follow-up",
  labs_imaging_needed: "Labs/imaging",
  routine_follow_up: "Routine",
};
const TIER_VARS = {
  emergency_department: "--ed",
  urgent_care_same_day: "--urgent",
  clinician_callback_required: "--callback",
  clinic_follow_up: "--clinic",
  labs_imaging_needed: "--labs",
  routine_follow_up: "--routine",
};

let selectedSlug = null;
let activeCallToken = 0; // bumped whenever selection changes, to cancel any in-flight animation
let editHistory = {};    // slug -> [{ time, before, after }]
let liveNote = {};       // slug -> current (possibly edited) note object

function goTo(view) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById("view-" + view).classList.add("active");
  if (view === "dashboard") renderQueue();
}

function patientBy(slug) { return PATIENTS.find(p => p.slug === slug); }

// ---------------------------------------------------------------------
// Sidebar: Care Team Queue
// ---------------------------------------------------------------------
function renderQueue() {
  const remaining = PATIENTS.filter(p => !p.called).length;
  document.getElementById("queue-sub").textContent =
    `${PATIENTS.length} patients · ${remaining} still need a call`;

  const list = document.getElementById("queue-list");
  list.innerHTML = "";
  PATIENTS.forEach(p => {
    const row = document.createElement("div");
    row.className = "queue-row" + (p.slug === selectedSlug ? " active" : "");
    row.onclick = () => selectPatient(p.slug);

    let statusHtml;
    if (p.called) {
      const tierVar = TIER_VARS[p.triage.severity] || "--muted";
      statusHtml = `<span class="queue-status-pill" style="background:var(${tierVar})">${TIER_LABELS_SHORT[p.triage.severity] || p.triage.severity}</span>`;
    } else {
      statusHtml = `<button class="queue-call-btn" onclick="event.stopPropagation(); selectPatient('${p.slug}'); beginCall('${p.slug}');">Call</button>`;
    }

    row.innerHTML = `
      <div class="qname">${p.name}</div>
      <div class="qmeta">${p.age}${p.gender === "female" ? "F" : "M"} &middot; day ${p.days_since_discharge} post-procedure</div>
      ${statusHtml}
    `;
    list.appendChild(row);
  });
}

// ---------------------------------------------------------------------
// Main panel: selecting a patient
// ---------------------------------------------------------------------
function selectPatient(slug) {
  selectedSlug = slug;
  activeCallToken++; // invalidate any in-flight animation from a previously selected patient
  renderQueue();

  const p = patientBy(slug);
  if (!p.called) {
    renderStartCallPanel(p);
  } else {
    renderCompletedRecord(p, /*instant=*/true);
  }
}

function renderStartCallPanel(p) {
  const panel = document.getElementById("main-panel");
  panel.innerHTML = `
    <div class="call-header">
      <h2>${p.name}</h2>
      <div class="meta">${p.age}${p.gender === "female" ? "F" : "M"} &mdash; ${p.discharge_dx}</div>
    </div>
    <div class="start-call-box">
      <h2>Ready to call ${p.name.split(" ")[0]}</h2>
      <p>Day ${p.days_since_discharge} post-procedure &mdash; no check-in call yet.</p>
      <button class="start-call-btn" onclick="beginCall('${p.slug}')">Start check-in call</button>
    </div>
  `;
}

// ---------------------------------------------------------------------
// Live call: animated transcript -> Agent 2 -> Agent 3
// ---------------------------------------------------------------------
function beginCall(slug) {
  const p = patientBy(slug);
  selectedSlug = slug;
  const myToken = ++activeCallToken;
  renderQueue();

  const panel = document.getElementById("main-panel");
  panel.innerHTML = `
    <div class="call-header">
      <h2>${p.name}</h2>
      <div class="meta">${p.age}${p.gender === "female" ? "F" : "M"} &mdash; ${p.discharge_dx}</div>
      <div class="call-status" id="call-status"><span class="dot"></span> Call in progress&hellip;</div>
    </div>
    <div id="section-transcript" class="section-block">
      <div class="section-label"><span class="badge-agent">Agent 1</span> Check-in conversation</div>
      <div class="transcript-area" id="transcript-area"></div>
    </div>
    <div id="section-triage" class="section-block">
      <div class="section-label"><span class="badge-agent">Agent 2</span> Reasoning Agent</div>
      <div id="tier-pill"></div>
      <div class="sub-label">Rationale</div>
      <ul class="rationale-list" id="rationale-list"></ul>
      <div class="sub-label">Flags cited</div>
      <ul class="flags-list" id="flags-list"></ul>
    </div>
    <div id="section-note" class="section-block">
      <div class="note-toolbar">
        <div class="section-label" style="margin-bottom:0;"><span class="badge-agent">Agent 3</span> Epic Note and Action Draft Agent</div>
        <button class="copy-btn" onclick="copyNote('${p.slug}')">Copy to Epic</button>
      </div>
      <div id="note-view"></div>
      <div id="note-edit" style="display:none;"></div>
      <div class="review-actions" id="review-actions">
        <button class="btn-agree" onclick="agreeNote('${p.slug}')">&#10003; Agree, proceed to Epic to complete actions</button>
        <button class="btn-edit" id="edit-toggle-btn" onclick="startEdit('${p.slug}')">&#9998; Edit Note and Action items</button>
      </div>
      <div class="review-actions" id="edit-actions" style="display:none;">
        <button class="btn-save" onclick="saveEdit('${p.slug}')">Save changes</button>
        <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
      </div>
      <div class="confirm-banner agree" id="confirm-agree">&#10003; Sent to Epic &mdash; action items created for care team follow-up.</div>
      <div class="edit-history" id="edit-history" onclick="toggleHistory('${p.slug}')">
        <span id="edit-history-label"></span>
        <div class="rev" id="edit-history-rev"></div>
      </div>
    </div>
  `;
  document.getElementById("section-transcript").classList.add("show");

  const area = document.getElementById("transcript-area");
  let i = 0;
  const lines = p.transcript;
  function nextLine() {
    if (myToken !== activeCallToken) return; // user navigated away — stop
    if (i >= lines.length) {
      document.getElementById("call-status").innerHTML = "&#9679; Call completed &mdash; analyzing transcript&hellip;";
      setTimeout(() => { if (myToken === activeCallToken) showTriage(p, myToken); }, 700);
      return;
    }
    const [who, line] = lines[i];
    const div = document.createElement("div");
    div.className = "t-line " + (who === "PT" || who === "FAMILY" ? "pt" : "agent");
    div.innerHTML = `<span class="who">${who}</span>${line}`;
    area.appendChild(div);
    i++;
    setTimeout(nextLine, 650);
  }
  nextLine();
}

function showTriage(p, myToken) {
  if (myToken !== activeCallToken) return;
  document.getElementById("call-status").textContent = "Call completed";
  const t = p.triage;
  const tierVar = TIER_VARS[t.severity] || "--muted";
  document.getElementById("tier-pill").innerHTML =
    `<span class="tier-pill" style="background:var(${tierVar})">${TIER_LABELS[t.severity] || t.severity}</span>
     <div style="font-size:13.5px;color:var(--muted);margin:-4px 0 10px;">${t.label}</div>`;
  document.getElementById("rationale-list").innerHTML = t.rationale.map(r => `<li>${r}</li>`).join("");
  document.getElementById("flags-list").innerHTML = (t.flags && t.flags.length ? t.flags : ["(none)"]).map(f => `<li>${f}</li>`).join("");
  document.getElementById("section-triage").classList.add("show");
  setTimeout(() => { if (myToken === activeCallToken) showNote(p, myToken); }, 900);
}

function showNote(p, myToken) {
  if (myToken !== activeCallToken) return;
  if (!liveNote[p.slug]) {
    liveNote[p.slug] = JSON.parse(JSON.stringify(p.note));
  }
  renderNoteView(p.slug);
  document.getElementById("section-note").classList.add("show");
  renderHistoryLabel(p.slug);

  // Mark this patient as called now that their record is complete, and
  // update the sidebar so their disposition shows instead of a Call button.
  p.called = true;
  renderQueue();
}

// ---------------------------------------------------------------------
// Revisiting an already-completed patient record (no animation)
// ---------------------------------------------------------------------
function renderCompletedRecord(p) {
  const panel = document.getElementById("main-panel");
  const t = p.triage;
  const tierVar = TIER_VARS[t.severity] || "--muted";
  const lines = p.transcript.map(([who, line]) =>
    `<div class="t-line instant ${who === "PT" || who === "FAMILY" ? "pt" : "agent"}"><span class="who">${who}</span>${line}</div>`
  ).join("");

  panel.innerHTML = `
    <div class="call-header">
      <h2>${p.name}</h2>
      <div class="meta">${p.age}${p.gender === "female" ? "F" : "M"} &mdash; ${p.discharge_dx}</div>
      <div class="call-status">&#9679; Call completed</div>
    </div>
    <div id="section-transcript" class="section-block instant show">
      <div class="section-label"><span class="badge-agent">Agent 1</span> Check-in conversation</div>
      <div class="transcript-area">${lines}</div>
    </div>
    <div id="section-triage" class="section-block instant show">
      <div class="section-label"><span class="badge-agent">Agent 2</span> Reasoning Agent</div>
      <div><span class="tier-pill" style="background:var(${tierVar})">${TIER_LABELS[t.severity] || t.severity}</span>
        <div style="font-size:13.5px;color:var(--muted);margin:-4px 0 10px;">${t.label}</div></div>
      <div class="sub-label">Rationale</div>
      <ul class="rationale-list">${t.rationale.map(r => `<li>${r}</li>`).join("")}</ul>
      <div class="sub-label">Flags cited</div>
      <ul class="flags-list">${(t.flags && t.flags.length ? t.flags : ["(none)"]).map(f => `<li>${f}</li>`).join("")}</ul>
    </div>
    <div id="section-note" class="section-block instant show">
      <div class="note-toolbar">
        <div class="section-label" style="margin-bottom:0;"><span class="badge-agent">Agent 3</span> Epic Note and Action Draft Agent</div>
        <button class="copy-btn" onclick="copyNote('${p.slug}')">Copy to Epic</button>
      </div>
      <div id="note-view"></div>
      <div id="note-edit" style="display:none;"></div>
      <div class="review-actions" id="review-actions">
        <button class="btn-agree" onclick="agreeNote('${p.slug}')">&#10003; Agree, proceed to Epic to complete actions</button>
        <button class="btn-edit" id="edit-toggle-btn" onclick="startEdit('${p.slug}')">&#9998; Edit Note and Action items</button>
      </div>
      <div class="review-actions" id="edit-actions" style="display:none;">
        <button class="btn-save" onclick="saveEdit('${p.slug}')">Save changes</button>
        <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
      </div>
      <div class="confirm-banner agree ${p.agreed ? "show" : ""}" id="confirm-agree">&#10003; Sent to Epic &mdash; action items created for care team follow-up.</div>
      <div class="edit-history" id="edit-history" onclick="toggleHistory('${p.slug}')">
        <span id="edit-history-label"></span>
        <div class="rev" id="edit-history-rev"></div>
      </div>
    </div>
  `;
  renderNoteView(p.slug);
  renderHistoryLabel(p.slug);
}

// ---------------------------------------------------------------------
// Note view / edit / history / agree / copy — all keyed by slug so state
// persists correctly no matter which patient is currently on screen.
// ---------------------------------------------------------------------
function renderNoteView(slug) {
  const n = liveNote[slug];
  document.getElementById("note-view").innerHTML = `
    <div class="note-field"><b>Subjective</b>${n.subjective}</div>
    <div class="note-field"><b>Assessment</b>${n.assessment}</div>
    <div class="note-field"><b>Plan</b>${n.plan}</div>
    <div class="note-field"><b>Action items</b>
      <ul class="action-items">${n.action_items.map(a => `<li>${a}</li>`).join("")}</ul>
    </div>
  `;
}

function startEdit(slug) {
  const n = liveNote[slug];
  document.getElementById("note-view").style.display = "none";
  const editBox = document.getElementById("note-edit");
  editBox.style.display = "block";
  editBox.innerHTML = `
    <div class="note-field"><b>Subjective</b><textarea id="edit-subjective">${n.subjective}</textarea></div>
    <div class="note-field"><b>Assessment</b><textarea id="edit-assessment">${n.assessment}</textarea></div>
    <div class="note-field"><b>Plan</b><textarea id="edit-plan">${n.plan}</textarea></div>
    <div class="note-field"><b>Action items</b>
      <ul class="action-items" id="edit-action-items">
        ${n.action_items.map((a, idx) => `<li><input type="text" value="${a.replace(/"/g,'&quot;')}" data-idx="${idx}"></li>`).join("")}
      </ul>
    </div>
  `;
  document.getElementById("review-actions").style.display = "none";
  document.getElementById("edit-actions").style.display = "flex";
}

function cancelEdit() {
  document.getElementById("note-edit").style.display = "none";
  document.getElementById("note-view").style.display = "block";
  document.getElementById("review-actions").style.display = "flex";
  document.getElementById("edit-actions").style.display = "none";
}

function saveEdit(slug) {
  const before = JSON.parse(JSON.stringify(liveNote[slug]));
  const after = {
    subjective: document.getElementById("edit-subjective").value,
    assessment: document.getElementById("edit-assessment").value,
    plan: document.getElementById("edit-plan").value,
    action_items: Array.from(document.querySelectorAll("#edit-action-items input")).map(i => i.value),
  };
  liveNote[slug] = after;

  if (!editHistory[slug]) editHistory[slug] = [];
  editHistory[slug].push({ time: new Date().toLocaleString(), before, after });

  renderNoteView(slug);
  document.getElementById("note-edit").style.display = "none";
  document.getElementById("note-view").style.display = "block";
  document.getElementById("review-actions").style.display = "flex";
  document.getElementById("edit-actions").style.display = "none";
  renderHistoryLabel(slug);
}

function renderHistoryLabel(slug) {
  const hist = editHistory[slug] || [];
  const el = document.getElementById("edit-history");
  if (!el) return;
  if (hist.length === 0) { el.classList.remove("show"); return; }
  el.classList.add("show");
  document.getElementById("edit-history-label").textContent =
    `✎ Edited ${hist.length} time${hist.length > 1 ? "s" : ""} — tap to view revision history`;
}

function toggleHistory(slug) {
  const rev = document.getElementById("edit-history-rev");
  const hist = editHistory[slug] || [];
  if (rev.classList.contains("open")) {
    rev.classList.remove("open");
    return;
  }
  rev.innerHTML = hist.map((h, i) => {
    function diffBlock(label, before, after) {
      if (before === after) return "";
      return `<div class="rev-block"><b>${label}</b><span class="strike">${before}</span><br><span class="added">${after}</span></div>`;
    }
    let actionDiff = "";
    if (JSON.stringify(h.before.action_items) !== JSON.stringify(h.after.action_items)) {
      actionDiff = `<div class="rev-block"><b>Action items</b>
        <span class="strike">${h.before.action_items.join("; ")}</span><br>
        <span class="added">${h.after.action_items.join("; ")}</span></div>`;
    }
    return `<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #eef1f5;">
      <div style="font-weight:600;margin-bottom:4px;">Revision ${i + 1} &mdash; ${h.time}</div>
      ${diffBlock("Subjective", h.before.subjective, h.after.subjective)}
      ${diffBlock("Assessment", h.before.assessment, h.after.assessment)}
      ${diffBlock("Plan", h.before.plan, h.after.plan)}
      ${actionDiff}
    </div>`;
  }).join("") || "<em>No changes recorded.</em>";
  rev.classList.add("open");
}

function agreeNote(slug) {
  patientBy(slug).agreed = true;
  document.getElementById("confirm-agree").classList.add("show");
}

function copyNote(slug) {
  const p = patientBy(slug);
  const n = liveNote[slug];
  const text =
    `POST-DISCHARGE CHECK-IN NOTE\n` +
    `Patient: ${p.name}, ${p.age}${p.gender === "female" ? "F" : "M"}\n` +
    `Days since procedure: ${p.days_since_discharge}\n` +
    `Procedure/discharge context: ${p.discharge_dx}\n\n` +
    `Subjective: ${n.subjective}\n\n` +
    `Assessment: ${n.assessment}\n\n` +
    `Plan: ${n.plan}\n\n` +
    `Action items:\n` + n.action_items.map(a => `- ${a}`).join("\n") +
    `\n\n⚠️ AI-drafted from a check-in call — clinician review required before this is entered in the chart.`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = "Copied ✓";
    setTimeout(() => { btn.textContent = orig; }, 1500);
  });
}
</script>
</body>
</html>
